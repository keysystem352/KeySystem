<!DOCTYPE html>
<html lang="en">
<head>

<style>
    body {

<body>

<div class="container">
    <h2>Start Get Key</h2>
    <button id="shortenBtn">Get Key</button>
</div>

<script>
// Base64 encode helper
function encodeBase64(str) {
    return btoa(unescape(encodeURIComponent(str)));
}

// Timestamp function (adds 24 min like Lua version)
function getTimestamp() {
    return Date.now() + 24 * 60 * 600 * 1000;
}

// Your system domain
const systemDomain = "https://get-key.keysystem3352.workers.dev/"; // replace with your domain

document.getElementById("shortenBtn").addEventListener("click", async () => {
    try {
        const encodedTime = encodeURIComponent(encodeBase64(getTimestamp().toString()));

        const apiKey = "f0bc0d7c496ef22cb0ea6a4e4161e021bd3e4fb5";
        const shrinkUrl = `https://shrinkearn.com/api?api=${apiKey}&url=${systemDomain}create/${encodedTime}`;

        const response = await fetch(shrinkUrl);
        const data = await response.json();
        const link = data.shortenedUrl;
        
        if (data.shortenedUrl) {
            // Open the shortened URL in a new tab
            window.open('https://tpi.li/key-system3', '_blank');
        } else {
            alert("No URL returned!");
        }
    } catch (err) {
        console.error(err);
        alert("Error fetching URL!");
    }
});
</script>
